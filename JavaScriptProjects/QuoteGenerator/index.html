<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="https://glitch.com/favicon.ico" />
    <title>Daily Quotes
        /title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/js/all.min.js"
        integrity="sha512-b+nQTCdtTBIRIbraqNEwsjB6UvL3UEMkXnhzd8awtCYh0Kcsjl9uEgwVFVbhoj3uu1DO1ZMacNvLoyJJiNfcvg=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
    </script>

     <script src="script.js"></script> 
</head>

<body>
    <!--Quote Generator-->
    <div class="flex flex-col items-center justify-center h-screen w-screen bg-[url(https://images.unsplash.com/photo-1481627834876-b7833e8f5570?q=80&w=928&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D)]">

        <div class=" w-2/3 flex flex-col gap-8 ">

            <h2 class="text-2xl font-semibold bg-black text-white py-2 px-6 border-2 border-white-900 rounded-md text-center backdrop-blur-md bg-black/60">
                Quote Generator
            </h2>

            <div class=" shadow-md bg-gray-200 inline-block h-600 w-600 border-2 border-gray-200 flex gap-5 flex-col p-4 rounded-lg opacity-70  items-center justify-center backdrop-blur-md bg-white/10"> 

                <p id="quote" class="text-center font-(family-name:Roboto) md:text-4xl text-black transition-all duration-500 ease-in-out opacity-100">
                    <span>"</span>
                    Lorem ipsum dolor sit amet consectetur, adipisicing elit. Natus sunt iste aliquam! Provident ab dignissimos nam labore doloribus tempore
                </p>

                <p id="name">Lorem ipsum dolor</p>

                <button class="self-center border-2 bg-black text-white py-2 px-4 rounded-lg" id="changer">New Quote</button>
            </div>

        </div>


    </div>

</body>

</html>
